apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers must have memory limits defined and memory requests must equal
      memory limits for QoS Guaranteed class. CPU limits should not be set
      as they cause CPU throttling and stability issues.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: require-memory-limits
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - kyverno
    validate:
      message: "Memory limits are required for all containers."
      pattern:
        spec:
          containers:
          - resources:
              limits:
                memory: "?*"
  - name: require-memory-requests
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - kyverno
    validate:
      message: "Memory requests are required for all containers."
      pattern:
        spec:
          containers:
          - resources:
              requests:
                memory: "?*"
  - name: require-memory-requests-equal-limits
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - kyverno
    validate:
      message: "Memory requests must equal memory limits."
      foreach:
      - list: "request.object.spec.containers"
        deny:
          conditions:
            any:
            - key: "{{ element.resources.requests.memory }}"
              operator: NotEquals
              value: "{{ element.resources.limits.memory }}"
  - name: require-cpu-requests
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - kyverno
    validate:
      message: "CPU requests are required for all containers."
      pattern:
        spec:
          containers:
          - resources:
              requests:
                cpu: "?*"
  - name: disallow-cpu-limits
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - kyverno
    validate:
      message: "CPU limits should not be set. They cause CPU throttling and stability issues."
      pattern:
        spec:
          containers:
          - resources:
              limits:
                X(cpu): "?*"
