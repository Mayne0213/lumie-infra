apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: zot.lumie-infra.com/openclaw/openclaw:2026.2.23
          command: ["sh", "-c"]
          args:
            - |
              cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
              echo "Config synced from ConfigMap"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /tmp/openclaw-config
              readOnly: true
      containers:
        - name: openclaw
          image: zot.lumie-infra.com/openclaw/openclaw:2026.2.23
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: TERM
              value: xterm-256color
            - name: OPENCLAW_GATEWAY_BIND
              value: lan
            - name: NODE_OPTIONS
              value: "--max-old-space-size=896"
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DEEPSEEK_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: 50m
              memory: 1Gi
            limits:
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["sh", "-c", "node -e \"require('net').createConnection(18789,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "node -e \"require('net').createConnection(18789,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            exec:
              command: ["sh", "-c", "node -e \"require('net').createConnection(18789,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: openclaw-config
        - name: openclaw-config
          configMap:
            name: openclaw-config
      restartPolicy: Always
