# ai-svc common chart values

common:
  name: ai-svc
  namespace: lumie-ai

  # Deployment
  deployment:
    enabled: true

  replicaCount: 1

  # Image
  image:
    registry: zot.lumie-infra.com
    repository: applications/ai-svc
    tag: "95644bf3"
    pullPolicy: IfNotPresent

  # Ports
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP

  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Container-level security context
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # Environment variables
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: "prod"
    - name: DB_HOST
      value: "lumie-db-rw.lumie-db.svc"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "lumie"
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: ai-svc-db-secrets
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: ai-svc-db-secrets
          key: password
    - name: RO_DB_HOST
      value: "lumie-db-ro.lumie-db.svc"
    - name: RO_DB_PORT
      value: "5432"
    - name: RO_DB_NAME
      value: "lumie"
    - name: RO_DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: ai-svc-ro-db-secrets
          key: username
    - name: RO_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: ai-svc-ro-db-secrets
          key: password
    - name: DEEPSEEK_API_KEY
      valueFrom:
        secretKeyRef:
          name: ai-svc-secrets
          key: DEEPSEEK_API_KEY
    - name: CONTENT_SVC_URL
      value: "http://content-svc.lumie-content.svc:8080"

  # Resources
  resources:
    requests:
      cpu: 30m
      memory: 512Mi
    limits:
      memory: 512Mi

  # Health checks (Spring Boot Actuator)
  healthCheck:
    enabled: true
    port: http
    livenessProbe:
      path: /actuator/health/liveness
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      path: /actuator/health/readiness
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startupProbe:
      path: /actuator/health
      periodSeconds: 5
      failureThreshold: 30

  # Service
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    ports:
      - name: http
        port: 8080
        targetPort: http
        protocol: TCP

  ingress:
    enabled: true
    className: kong
    annotations:
      konghq.com/strip-path: "true"
      konghq.com/plugins: lumie-cors,lumie-jwt,lumie-jwt-claims
    hosts:
      - host: lumie0213.kro.kr
        paths:
          - path: /api/ai
            pathType: Prefix
    tls: []

  # ServiceMonitor for Prometheus
  serviceMonitor:
    enabled: true
    endpoints:
      - port: http
        interval: 30s
        path: /actuator/prometheus

  # Vault Static Secrets
  vaultStaticSecrets:
    # Database credentials (RW)
    - name: ai-svc-db-vss
      path: storage/postgresql
      destination:
        name: ai-svc-db-secrets
        transformation:
          templates:
            username: "{{ .Secrets.POSTGRES_USER }}"
            password: "{{ .Secrets.POSTGRES_PASSWORD }}"
    # Database credentials (RO - openclaw)
    - name: ai-svc-ro-db-vss
      path: applications/ai-svc
      destination:
        name: ai-svc-ro-db-secrets
        transformation:
          templates:
            username: "{{ .Secrets.OPENCLAW_USERNAME }}"
            password: "{{ .Secrets.OPENCLAW_PASSWORD }}"
    # DeepSeek API Key
    - name: ai-svc-secrets-vss
      path: applications/ai-svc
      destination:
        name: ai-svc-secrets
        transformation:
          templates:
            DEEPSEEK_API_KEY: "{{ .Secrets.DEEPSEEK_API_KEY }}"
