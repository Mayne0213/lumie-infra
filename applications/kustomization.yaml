apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Self-reference for App of Apps pattern
  - application.yaml

  # ArgoCD self-management (installed by Ansible, managed by GitOps)
  - argocd/argocd.yaml

  - lumie/document/argocd.yaml
  - code-server/argocd.yaml
  - umami/argocd.yaml
  - headlamp/argocd.yaml
  - openclaw/argocd.yaml

  # Tekton CI/CD
  - tekton/pipeline/argocd.yaml
  - tekton/triggers/argocd.yaml
  - tekton/dashboard/argocd.yaml
  - tekton/ci-cd/argocd.yaml

  # LUMIE Platform
  - lumie/argocd.yaml
  - lumie/develop/argocd.yaml

  # LUMIE Backend
  - lumie/backend/tenant-svc/argocd.yaml
  - lumie/backend/auth-svc/argocd.yaml
  - lumie/backend/billing-svc/argocd.yaml
  - lumie/backend/academy-svc/argocd.yaml
  - lumie/backend/exam-svc/argocd.yaml
  - lumie/backend/content-svc/argocd.yaml
  - lumie/backend/file-svc/argocd.yaml
  - lumie/backend/admin-svc/argocd.yaml
  - lumie/backend/attendance-svc/argocd.yaml

  # LUMIE Frontend
  - lumie/frontend/argocd.yaml

  # LUMIE AI
  - lumie/ai/ai-svc/argocd.yaml
  - lumie/ai/analysis-svc/argocd.yaml
  - lumie/ai/grading-svc/argocd.yaml
  - lumie/ai/report-svc/argocd.yaml
