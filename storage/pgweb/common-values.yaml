# Common chart values for pgweb
common:
  name: pgweb

  # Disable deployment (external chart creates it)
  deployment:
    enabled: false

  service:
    enabled: false

  ingress:
    enabled: false

  # Vault Static Secrets (VSO)
  vaultStaticSecrets:
    - name: pgweb-db-vss
      path: storage/postgresql
      destination:
        name: pgweb-db-secrets
        transformation:
          templates:
            database-url: "postgresql://{{ .Secrets.POSTGRES_USER }}:{{ .Secrets.POSTGRES_PASSWORD }}@lumie-db-rw.lumie-db.svc:5432/lumie"
